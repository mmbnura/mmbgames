<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MMB Chess</title>
  <link rel="stylesheet" href="mmbchess.css" />
</head>
<body>
  <div class="brand-logo"><span class="icon">♞</span><span class="text">MMB Chess <span class="sub">Studio</span></span></div>
  <div class="brand-menu">
    <button id="openAnalyzerFromMenuBtn" class="secondary">Game Analyzer</button>
  </div>
  <div class="top-actions">
    <button id="newGameTopBtn">New Game</button>
  </div>
  <div class="version-footer" id="versionFooter">MMB Chess v0.8</div>
  <div class="app">
    <div class="board-area">
      <div class="board-frame">
        <div class="labels-files top-files" id="topFiles"></div>
        <div class="labels-files bottom-files" id="bottomFiles"></div>
        <div class="labels-ranks left-ranks" id="leftRanks"></div>
        <div class="labels-ranks right-ranks" id="rightRanks"></div>
        <div id="board" class="board"></div>
      </div>
      <div class="turn-indicator"><span id="turnDot" class="dot"></span><span id="turnText"></span></div>
    </div>
    <aside class="side">
      <div class="card">
        <h4>Game Status</h4>
        <div id="statusText" class="status-text"></div>
      </div>
      <div class="card">
        <h4>Difficulty</h4>
        <div id="difficultyText" class="difficulty"></div>
      </div>
      <div class="card">
        <h4>Timers</h4>
        <div class="status-text">White: <span id="whiteTimer">00:00</span></div>
        <div class="status-text">Black: <span id="blackTimer">00:00</span></div>
      </div>
      <div class="card">
        <h4>White Captured</h4>
        <div id="whiteCaptured" class="captured"></div>
      </div>
      <div class="card">
        <h4>Black Captured</h4>
        <div id="blackCaptured" class="captured"></div>
      </div>
      <div class="card">
        <h4>Move History</h4>
        <div id="history" class="history"></div>
      </div>
      <button id="changeDifficultyBtn" class="secondary">Change Difficulty</button>
      <button id="resignBtn" class="danger">Resign</button>
    </aside>
  </div>
  <div id="difficultyModal" class="overlay">
    <div class="modal">
      <h2>Select Difficulty</h2>
      <div class="difficulty-list" id="difficultyList"></div>
    </div>
  </div>
  <div id="promotionModal" class="overlay">
    <div class="modal">
      <h2>Choose Promotion</h2>
      <div class="promo-choices" id="promotionChoices"></div>
    </div>
  </div>
  <div id="gameOverModal" class="overlay">
    <div class="modal">
      <h2 id="gameOverTitle"></h2>
      <p id="gameOverBody"></p>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button id="playAgainBtn">Play Again</button>
        <button id="changeDifficultyGameOverBtn" class="secondary">Change Difficulty</button>
        <button id="reviewGameBtn" class="secondary">📊 Review Game</button>
        <button id="copyHistoryBtn" class="secondary">Copy Move History</button>
      </div>
    </div>
  </div>
<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup } 
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    // PASTE YOUR CONFIG HERE
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Google Sign-in button
  document.getElementById('googleSignInButton').innerHTML = 
    `<button id="googleBtn" style="width:100%;padding:10px;border-radius:8px;
     border:1px solid #ddd;background:#fff;color:#333;font-weight:700;
     cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
      <img src="https://www.google.com/favicon.ico" width="18"> Sign in with Google
    </button>`;

  document.getElementById('googleBtn').onclick = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      // Store user info for mmbchess.js to use
      localStorage.setItem('mmb_google_user', JSON.stringify({
        uid: user.uid,           // Firebase UID — used as Firestore key
        email: user.email,
        name: user.displayName,
        picture: user.photoURL,
        accessToken: await user.getIdToken(), // for Firestore auth
        signedInAt: new Date().toISOString()
      }));
      window.location.href = 'chess.html';
    } catch (err) {
      document.getElementById('configError').style.display = 'block';
      document.getElementById('configError').textContent = err.message;
    }
  };

  // Guest button stays the same
  document.getElementById('continueGuestBtn').onclick = () => {
    localStorage.setItem('mmb_google_user', JSON.stringify({
      uid: null, name: 'Guest', authProvider: 'guest',
      signedInAt: new Date().toISOString()
    }));
    window.location.href = 'chess.html';
  };
</script>
  </body>
</html>
