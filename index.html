<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MMB Chess — Sign in</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #20243d;
      --text: #f2f4ff;
      --muted: #b8bfe8;
      --accent: #5ad1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #242b55 0%, var(--bg) 55%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .welcome-card {
      width: min(96vw, 480px);
      background: var(--panel);
      border: 1px solid #3a4070;
      border-radius: 14px;
      box-shadow: 0 20px 45px rgba(0,0,0,.4);
      padding: 24px;
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .brand .icon {
      width: 36px; height: 36px; border-radius: 9px;
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #f0d9b5, #b58863);
      color: #111; font-size: 22px;
    }
    .brand .name { font-size: 24px; font-weight: 800; }
    .brand .name .sub { color: #8fd7ff; font-size: 14px; margin-left: 6px; }
    h1 { margin: 4px 0 8px; font-size: 26px; }
    p { margin: 0 0 14px; color: var(--muted); line-height: 1.45; }
    .signin-wrap {
      background: #171a31;
      border: 1px solid #2a2f57;
      border-radius: 10px;
      padding: 14px;
    }
    #googleSignInButton {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hint { margin-top: 10px; font-size: 13px; color: var(--muted); }
    .error { color: #ff9f9f; margin-top: 8px; font-size: 13px; display:none; }
    .footer { margin-top: 14px; font-size: 12px; color: #9ba3d8; text-align: center; }
  </style>
</head>
<body>
  <main class="welcome-card">
    <div class="brand"><span class="icon">♞</span><div class="name">MMB Chess <span class="sub">Studio</span></div></div>
    <h1>Welcome</h1>
    <p>Sign in with Google to continue to MMB Chess. After successful login, you'll be redirected to the game.</p>

    <div class="signin-wrap">
      <div id="googleSignInButton"></div>
      <div id="configError" class="error"></div>
      <div id="signInStatus" class="hint" style="display:none;margin-top:8px;"></div>
      <div class="hint">Need setup help? Provide a Google OAuth client ID and set it in <code>window.GOOGLE_CLIENT_ID</code> before this script runs.</div>
      <button id="continueGuestBtn" style="margin-top:10px;width:100%;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;color:#fff;background:#4a4f74;">Continue without Google sign-in</button>
    </div>

    <div class="footer">MMB Chess v0.8</div>
  </main>

  <script>
    (function(){
      const storageKey = 'mmb_google_user';
      const DEFAULT_GOOGLE_CLIENT_ID = '613800272186-8doglal06v7371nvitg57gr6750k03jr.apps.googleusercontent.com';
      const clientId = window.GOOGLE_CLIENT_ID || localStorage.getItem('mmb_google_client_id') || DEFAULT_GOOGLE_CLIENT_ID;
      const errorEl = document.getElementById('configError');
      const statusEl = document.getElementById('signInStatus');
      const guestBtn = document.getElementById('continueGuestBtn');


      guestBtn?.addEventListener('click', () => {
        localStorage.setItem(storageKey, JSON.stringify({
          email: '',
          name: 'Guest',
          picture: '',
          signedInAt: new Date().toISOString(),
          authProvider: 'guest'
        }));
        window.location.href = 'chess.html';
      });


      function showStatus(msg) {
        if (!statusEl) return;
        statusEl.style.display = 'block';
        statusEl.textContent = msg;
      }

      function decodeJwtPayload(jwt) {
        const payload = jwt.split('.')[1];
        const b64 = payload.replace(/-/g, '+').replace(/_/g, '/');
        const json = decodeURIComponent(atob(b64).split('').map(c => `%${(`00${c.charCodeAt(0).toString(16)}`).slice(-2)}`).join(''));
        return JSON.parse(json);
      }

      function onCredentialResponse(response) {
        try {
          const profile = decodeJwtPayload(response.credential);
          localStorage.setItem(storageKey, JSON.stringify({
            email: profile.email || '',
            name: profile.name || 'User',
            picture: profile.picture || '',
            signedInAt: new Date().toISOString()
          }));
          window.location.href = 'chess.html';
        } catch (err) {
          errorEl.style.display = 'block';
          errorEl.textContent = 'Sign-in succeeded but profile parsing failed. Please try again.';
        }
      }

      if (!clientId) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Google SSO is not configured yet. You can continue as guest or set GOOGLE_CLIENT_ID to enable sign-in.';
      } else {

      const script = document.createElement('script');
      script.src = 'https://accounts.google.com/gsi/client';
      script.async = true;
      script.defer = true;
      script.onload = function() {
        try {
          google.accounts.id.initialize({
            client_id: clientId,
            callback: onCredentialResponse,
            ux_mode: 'popup'
          });
          google.accounts.id.renderButton(
            document.getElementById('googleSignInButton'),
            { theme: 'outline', size: 'large', shape: 'pill', text: 'signin_with', width: 320 }
          );
          google.accounts.id.prompt((notification) => {
            if (notification.isNotDisplayed && notification.isNotDisplayed()) {
              showStatus(`Google Sign-In is unavailable (${notification.getNotDisplayedReason?.() || 'not displayed'}). You can continue as guest.`);
            } else if (notification.isSkippedMoment && notification.isSkippedMoment()) {
              showStatus('Google Sign-In prompt was skipped. You can continue as guest.');
            }
          });
        } catch (e) {
          errorEl.style.display = 'block';
          errorEl.textContent = 'Google Sign-In initialization failed. You can continue as guest.';
        }
      };
      script.onerror = function() {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Could not load Google Sign-In SDK. Check internet/network policies.';
      };
      document.head.appendChild(script);
      }
    })();
  </script>
</body>
</html>
